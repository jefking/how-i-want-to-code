name: Docker Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel to publish or promote
        required: true
        default: pre-production
        type: choice
        options:
          - pre-production
          - production

permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' || github.event.inputs.channel == 'pre-production'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  publish:
    name: Publish vnext Docker image
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' || github.event.inputs.channel == 'pre-production'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: moltenai
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: moltenai/moltenhub-code
          tags: |
            type=raw,value=vnext,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=vnext,enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.channel == 'pre-production' }}
            type=raw,value=${{ github.run_number }},enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.run_number }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.channel == 'pre-production' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  promote:
    name: Promote vnext to latest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.channel == 'production'
    steps:
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: moltenai
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Promote existing image
        run: docker buildx imagetools create --tag moltenai/moltenhub-code:latest moltenai/moltenhub-code:vnext
