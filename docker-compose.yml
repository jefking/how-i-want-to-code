services:
  harness:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AGENT_HARNESS: pi
        AGENT_COMMAND: pi
    image: moltenhub-code:local
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment:
      HOME: /tmp
      HARNESS_RUNTIME_CONFIG_PATH: /workspace/config/config.json
    ports:
      - 3300:7777
    volumes:
      - ./.moltenhub:/workspace/config
    command: ["harness", "hub", "--ui-listen", ":7777"]
