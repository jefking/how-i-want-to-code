services:
  harness:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AGENT_HARNESS: ${AGENT_HARNESS:-codex}
        AGENT_NPM_PACKAGE: ${AGENT_NPM_PACKAGE:-}
        AGENT_COMMAND: ${AGENT_COMMAND:-}
    image: moltenhub-code:local
    ports:
      - 3232:7777
    shm_size: "2gb"
    env_file:
      - .env
    volumes:
      - ./.moltenhub/moltenbot000:/workspace/
    command: ["harness", "hub", "--init", "/workspace/init.json", "--ui-listen", ":7777"]
