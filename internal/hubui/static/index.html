<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>molten hub codex multiplexor</title>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            hub: {
              bg: "#0b111a",
              panel: "#111c2a",
              panelSoft: "#16263a",
              border: "#29405b",
              text: "#dfe7ef",
              muted: "#94a6ba",
              good: "#4fd38c",
              warn: "#ffbe55",
              bad: "#f27171",
              running: "#51b8ff",
              meta: "#88a2bd",
              accent: "#f6b36a"
            }
          },
          fontFamily: {
            sans: ["IBM Plex Sans", "Segoe UI", "sans-serif"],
            mono: ["IBM Plex Mono", "Consolas", "monospace"]
          }
        }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="min-h-screen bg-hub-bg text-hub-text antialiased">
  <div class="app mx-auto grid w-full max-w-[1500px] gap-4 p-5">
    <div class="header flex flex-wrap items-center justify-between gap-3">
      <div>
        <div class="title text-[1.4rem] font-bold uppercase tracking-[0.04em]">molten hub codex multiplexor</div>
        <div class="sub text-sm text-hub-muted">Live task status + terminal output</div>
      </div>
      <div class="status-row flex flex-wrap items-center gap-2.5 text-sm text-hub-muted">
        <div class="status-item flex min-h-[30px] items-center gap-2 rounded-full border border-hub-border bg-hub-panel/75 px-2.5 py-1">
          <span id="local-conn-dot" class="dot"></span>
          <span class="status-text grid min-w-0 gap-px">
            <span class="status-label text-[0.62rem] uppercase leading-tight tracking-[0.05em] text-hub-muted">Local Instance</span>
            <span id="local-conn-text" class="status-value break-words text-xs leading-tight text-slate-200">Connecting...</span>
          </span>
        </div>
        <div class="status-item flex min-h-[30px] items-center gap-2 rounded-full border border-hub-border bg-hub-panel/75 px-2.5 py-1">
          <span id="hub-conn-dot" class="dot"></span>
          <span class="status-text grid min-w-0 gap-px">
            <span class="status-label text-[0.62rem] uppercase leading-tight tracking-[0.05em] text-hub-muted">MoltenHub</span>
            <span id="hub-conn-text" class="status-value break-words text-xs leading-tight text-slate-200">Waiting for hub status...</span>
          </span>
        </div>
      </div>
    </div>

    <div class="layout min-h-[calc(100vh-130px)] max-[980px]:min-h-0">
      <div class="right-col grid gap-4 [grid-template-rows:minmax(220px,30%)_minmax(220px,32%)_minmax(260px,1fr)] max-[980px]:[grid-template-rows:minmax(250px,40vh)_minmax(220px,34vh)_minmax(260px,46vh)]">
        <section class="panel prompt-wrap min-h-[220px] overflow-hidden rounded-2xl border border-hub-border bg-hub-panel bg-[linear-gradient(170deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01))]">
          <div class="panel-header flex items-center justify-between gap-2 border-b border-hub-border bg-black/15 px-3.5 py-3 text-[0.92rem] font-semibold uppercase tracking-[0.03em]">
            <span>Local Prompt</span>
          </div>
          <form id="local-prompt-form" class="prompt-form grid [grid-template-rows:auto_auto_auto] gap-2.5 p-3">
            <textarea
              id="local-prompt-input"
              class="prompt-text h-[calc(7*1.4em+20px)] min-h-[calc(7*1.4em+20px)] w-full resize-y rounded-lg border border-hub-border bg-[#0d1825] p-2.5 font-mono text-[0.79rem] leading-[1.4] text-slate-200 focus:border-[#6a8aac] focus:outline-none focus:ring-1 focus:ring-[#6a8aac]"
              rows="7"
              spellcheck="false"
              placeholder='{
  "repos": [
    "git@github.com:org/repo.git"
  ],
  "base_branch": "main",
  "target_subdir": ".",
  "prompt": "Describe the change you want"
}'></textarea>
            <div class="prompt-hint text-[0.74rem] leading-[1.3] text-hub-muted">Paste one JSON object with: prompt and one of repo, repo_url, or repos. The UI normalizes JSON before submit.</div>
            <div class="prompt-actions flex flex-wrap items-center justify-between gap-2.5">
              <button id="local-prompt-submit" class="prompt-submit rounded-lg border border-[#597695] bg-[#2f4864] px-3 py-2 text-[0.8rem] font-semibold text-hub-text transition hover:-translate-y-px hover:border-[#83a3c4] disabled:cursor-not-allowed disabled:opacity-65 disabled:translate-y-0" type="submit">Run Local Prompt</button>
              <span id="local-prompt-status" class="submit-status min-h-[1.3em] text-[0.74rem] leading-[1.3] text-hub-muted">Idle</span>
            </div>
          </form>
        </section>

        <section class="panel min-h-[220px] overflow-hidden rounded-2xl border border-hub-border bg-hub-panel bg-[linear-gradient(170deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01))]">
          <div class="panel-header flex items-center justify-between gap-2 border-b border-hub-border bg-black/15 px-3.5 py-3 text-[0.92rem] font-semibold uppercase tracking-[0.03em]">
            <span>Tasks</span>
            <span class="counter text-[0.82rem] font-bold text-hub-accent" id="task-count">0</span>
          </div>
          <div class="scroll task-scroll h-[calc(100%-48px)] overflow-auto">
            <div id="task-list" class="task-list grid gap-2 p-3"></div>
          </div>
        </section>

        <section class="panel log-wrap grid h-full [grid-template-rows:auto_auto_1fr] overflow-hidden rounded-2xl border border-hub-border bg-hub-panel bg-[linear-gradient(170deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01))]">
          <div id="task-head" class="task-head flex items-center justify-between gap-2 border-b border-hub-border px-3.5 py-2.5 text-[0.84rem] text-hub-muted">Select a task to inspect logs</div>
          <div id="task-result" class="task-result hidden flex-wrap items-center gap-2.5 border-b border-hub-border px-3.5 py-2 text-[0.78rem]"></div>
          <pre id="terminal" class="term task-scroll m-0 h-full overflow-auto whitespace-pre-wrap break-words bg-[#0c1724] p-3 font-mono text-[0.79rem] leading-[1.35] text-[#dbe6f2]"></pre>
        </section>
      </div>
    </div>
  </div>

  <script>
    const MAIN_TASK_ID = "__main__";
    const MAIN_TASK_LABEL = "main";
    const TASK_PROMPT_PREVIEW_MAX = 30;
    const DISMISSED_TASKS_KEY = "hubui.dismissedTaskIds";
    const COMPLETED_STATUSES = new Set(["ok", "no_changes", "error", "invalid", "duplicate"]);
    const TASK_PROGRESS_STEPS = [
      { id: "received", label: "Task Received", detail: "Dispatch accepted by hub." },
      { id: "run", label: "Run Started", detail: "Harness run initialized." },
      { id: "prepare", label: "Prepare", detail: "Preflight, auth, and workspace setup." },
      { id: "clone", label: "Git Clone", detail: "Repository clone and branch setup." },
      { id: "codex", label: "Codex", detail: "Codex execution in progress." },
      { id: "finalize", label: "Finalize", detail: "Commit, PR, and checks." },
    ];

    function loadDismissedTaskIDs() {
      try {
        const raw = localStorage.getItem(DISMISSED_TASKS_KEY);
        if (!raw) return new Set();
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return new Set();
        return new Set(parsed.filter((id) => typeof id === "string" && id));
      } catch (_err) {
        return new Set();
      }
    }

    const state = {
      snapshot: null,
      selectedTaskId: "",
      dismissedTaskIDs: loadDismissedTaskIDs(),
      rerunInFlight: new Set(),
      closeInFlight: new Set(),
    };

    const localConnDot = document.getElementById("local-conn-dot");
    const localConnText = document.getElementById("local-conn-text");
    const hubConnDot = document.getElementById("hub-conn-dot");
    const hubConnText = document.getElementById("hub-conn-text");
    const taskCount = document.getElementById("task-count");
    const taskList = document.getElementById("task-list");
    const taskHead = document.getElementById("task-head");
    const taskResult = document.getElementById("task-result");
    const terminal = document.getElementById("terminal");
    const localPromptForm = document.getElementById("local-prompt-form");
    const localPromptInput = document.getElementById("local-prompt-input");
    const localPromptSubmit = document.getElementById("local-prompt-submit");
    const localPromptStatus = document.getElementById("local-prompt-status");

    function setIndicator(dot, textNode, online, text) {
      dot.classList.toggle("online", online);
      textNode.textContent = text;
    }

    function setLocalConnection(online, text) {
      setIndicator(localConnDot, localConnText, online, text);
    }

    function setHubConnection(online, text) {
      setIndicator(hubConnDot, hubConnText, online, text);
    }

    function renderHubConnection(snapshot) {
      if (!snapshot || typeof snapshot.connection !== "object" || snapshot.connection === null) {
        setHubConnection(false, "Hub status unavailable");
        return;
      }

      const conn = snapshot.connection;
      const domain = typeof conn.hub_domain === "string" ? conn.hub_domain.trim() : "";
      const baseURL = typeof conn.hub_base_url === "string" ? conn.hub_base_url.trim() : "";
      const target = domain || baseURL || "hub";

      if (conn.hub_connected) {
        setHubConnection(true, `Connected to ${target}`);
        return;
      }

      if (domain || baseURL) {
        setHubConnection(false, `Disconnected from ${target}`);
        return;
      }

      setHubConnection(false, "Connecting...");
    }

    function escapeLiteralNewlinesInJSONStrings(raw) {
      let out = "";
      let inString = false;
      let escaped = false;
      for (let i = 0; i < raw.length; i += 1) {
        const ch = raw[i];
        if (!inString) {
          out += ch;
          if (ch === "\"") {
            inString = true;
          }
          continue;
        }

        if (escaped) {
          out += ch;
          escaped = false;
          continue;
        }
        if (ch === "\\") {
          out += ch;
          escaped = true;
          continue;
        }
        if (ch === "\"") {
          out += ch;
          inString = false;
          continue;
        }
        if (ch === "\r") {
          if (raw[i + 1] === "\n") {
            i += 1;
          }
          out += "\\n";
          continue;
        }
        if (ch === "\n") {
          out += "\\n";
          continue;
        }

        out += ch;
      }
      return out;
    }

    function parseLocalPromptPayload(raw) {
      const trimmed = String(raw || "").trim();
      if (!trimmed) {
        throw new Error("Paste a JSON payload first.");
      }

      try {
        return JSON.parse(trimmed);
      } catch (primaryErr) {
        const escaped = escapeLiteralNewlinesInJSONStrings(trimmed);
        if (escaped === trimmed) {
          throw primaryErr;
        }
        return JSON.parse(escaped);
      }
    }

    function normalizedLocalPromptPayload(raw) {
      const parsed = parseLocalPromptPayload(raw);
      if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) {
        throw new Error("Payload must be one JSON object.");
      }
      return {
        compact: JSON.stringify(parsed),
        pretty: JSON.stringify(parsed, null, 2),
      };
    }

    function relativeTime(iso) {
      if (!iso) return "";
      const ts = new Date(iso).getTime();
      if (Number.isNaN(ts)) return iso;
      const delta = Date.now() - ts;
      const sec = Math.floor(delta / 1000);
      if (sec < 2) return "just now";
      if (sec < 60) return `${sec}s ago`;
      const min = Math.floor(sec / 60);
      if (min < 60) return `${min}m ago`;
      const hr = Math.floor(min / 60);
      if (hr < 24) return `${hr}h ago`;
      return new Date(iso).toLocaleString();
    }

    function cleanRepoName(value) {
      let repo = String(value || "").trim();
      if (!repo) return "";

      repo = repo.replace(/^git@github\.com:/, "");
      repo = repo.replace(/^ssh:\/\/git@github\.com\//, "");
      repo = repo.replace(/^https?:\/\/github\.com\//, "");
      repo = repo.replace(/\.git$/, "");
      return repo;
    }

    function normalizedTaskRepos(task) {
      const raw = [];
      if (Array.isArray(task?.repos)) {
        raw.push(...task.repos);
      }
      if (typeof task?.repo === "string" && task.repo.trim()) {
        raw.unshift(task.repo);
      }

      const seen = new Set();
      const out = [];
      for (const value of raw) {
        const cleaned = cleanRepoName(value);
        if (!cleaned || seen.has(cleaned)) continue;
        seen.add(cleaned);
        out.push(cleaned);
      }
      return out;
    }

    function formatTaskRepos(task) {
      const repos = normalizedTaskRepos(task);
      if (!repos.length) return "-";
      return `[${repos.join(", ")}]`;
    }

    function taskPromptText(task) {
      if (!task || typeof task.prompt !== "string") return "";
      return task.prompt.replace(/\s+/g, " ").trim();
    }

    function taskPromptPreview(task) {
      const prompt = taskPromptText(task);
      if (!prompt) return "";
      if (prompt.length <= TASK_PROMPT_PREVIEW_MAX) {
        return prompt;
      }
      return `${prompt.slice(0, TASK_PROMPT_PREVIEW_MAX)}...`;
    }

    function taskDisplayLabel(task) {
      const id = task?.display_id || task?.request_id || "";
      if (!task || task.request_id === MAIN_TASK_ID) {
        return id;
      }
      const preview = taskPromptPreview(task);
      if (!preview) {
        return id;
      }
      return `${id} | ${preview}`;
    }

    function statusClass(status) {
      if (!status) return "";
      return status.replace(/[^a-z_]/g, "");
    }

    function setLocalPromptStatus(kind, text) {
      localPromptStatus.className = kind ? `submit-status ${kind}` : "submit-status";
      localPromptStatus.textContent = text;
    }

    function duplicateNotice(body) {
      const requestID = body?.request_id || "(unknown)";
      const rawState = String(body?.state || "").trim();
      if (!rawState) {
        return `Duplicate ignored; existing request ${requestID}.`;
      }
      return `Duplicate ignored; existing request ${requestID} (${rawState.replace(/_/g, " ")}).`;
    }

    function persistDismissedTaskIDs() {
      try {
        localStorage.setItem(DISMISSED_TASKS_KEY, JSON.stringify(Array.from(state.dismissedTaskIDs)));
      } catch (_err) {
        // Ignore localStorage failures.
      }
    }

    function isCompletedTask(task) {
      if (!task || task.request_id === MAIN_TASK_ID) {
        return false;
      }
      return COMPLETED_STATUSES.has(task.status || "");
    }

    async function dismissTask(requestID) {
      if (!requestID || state.closeInFlight.has(requestID)) return;
      state.closeInFlight.add(requestID);
      render(state.snapshot);

      try {
        const response = await fetch(`/api/tasks/${encodeURIComponent(requestID)}/close`, {
          method: "POST",
        });
        let body = null;
        try {
          body = await response.json();
        } catch (_err) {
          body = null;
        }
        if (!response.ok) {
          throw new Error(body?.error || `close http ${response.status}`);
        }

        state.dismissedTaskIDs.add(requestID);
        persistDismissedTaskIDs();
        if (state.selectedTaskId === requestID) {
          state.selectedTaskId = "";
        }
        setLocalPromptStatus("ok", `Closed task ${requestID}`);
        render(state.snapshot);
      } catch (err) {
        setLocalPromptStatus("error", `Close failed: ${err.message}`);
      } finally {
        state.closeInFlight.delete(requestID);
        render(state.snapshot);
      }
    }

    function canRerunTask(task) {
      if (!task || task.request_id === MAIN_TASK_ID) {
        return false;
      }
      if (!isCompletedTask(task)) {
        return false;
      }
      return Boolean(task.can_rerun);
    }

    async function rerunTask(requestID) {
      if (!requestID || state.rerunInFlight.has(requestID)) {
        return;
      }
      state.rerunInFlight.add(requestID);
      render(state.snapshot);
      setLocalPromptStatus("warn", `Re-running ${requestID}...`);

      try {
        const response = await fetch(`/api/tasks/${encodeURIComponent(requestID)}/rerun`, {
          method: "POST",
        });

        let body = null;
        try {
          body = await response.json();
        } catch (_err) {
          body = null;
        }

        if (!response.ok) {
          if (response.status === 409 && body?.duplicate) {
            setLocalPromptStatus("warn", duplicateNotice(body));
            return;
          }
          throw new Error(body?.error || `rerun http ${response.status}`);
        }

        const newRequestID = body?.request_id || "(unknown)";
        setLocalPromptStatus("ok", `Queued request ${newRequestID} (re-run of ${requestID})`);
      } catch (err) {
        setLocalPromptStatus("error", `Re-run failed: ${err.message}`);
      } finally {
        state.rerunInFlight.delete(requestID);
        render(state.snapshot);
      }
    }

    function extractField(line, key) {
      if (!line || !key) return "";
      const escaped = key.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      const match = line.match(new RegExp(`(?:^|\\s)${escaped}=([^\\s]+)`));
      return match ? match[1] : "";
    }

    function decodeB64(value) {
      if (!value) return "";
      try {
        const raw = atob(value);
        const bytes = Uint8Array.from(raw, (c) => c.charCodeAt(0));
        return new TextDecoder().decode(bytes);
      } catch (_err) {
        return "";
      }
    }

    function displayTasks(snapshot) {
      const events = snapshot.events || [];
      const mainLogs = [];
      let startedAt = "";

      for (const event of events) {
        if (event.request_id) continue;

        if (!startedAt && event.time) {
          startedAt = event.time;
        }

        const line = event.line || "";
        const stream = extractField(line, "stream") || "meta";
        const b64 = extractField(line, "b64");
        const decoded = decodeB64(b64);

        mainLogs.push({
          time: event.time || snapshot.generated_at,
          stream,
          text: decoded || line,
        });
      }

      const mainTask = {
        request_id: MAIN_TASK_ID,
        display_id: MAIN_TASK_LABEL,
        status: mainLogs.length ? "active" : "idle",
        stage: "default thread",
        skill: "-",
        repo: "-",
        repos: [],
        started_at: startedAt || snapshot.generated_at,
        updated_at: mainLogs.length ? mainLogs[mainLogs.length - 1].time : snapshot.generated_at,
        logs: mainLogs,
      };

      const taskItems = (snapshot.tasks || []).filter((task) => {
        if (!task || !task.request_id) {
          return false;
        }
        if (!state.dismissedTaskIDs.has(task.request_id)) {
          return true;
        }
        return !isCompletedTask(task);
      });

      return [mainTask, ...taskItems];
    }

    function taskPreviewLines(task) {
      const logs = Array.isArray(task.logs) ? task.logs : [];
      if (!logs.length) return [];
      const outputLogs = logs.filter((row) => {
        const stream = row.stream || "meta";
        return stream === "stdout" || stream === "stderr";
      });
      const source = outputLogs.length ? outputLogs : logs;
      return source.slice(-5);
    }

    function previewText(row) {
      const stream = row.stream || "meta";
      const text = String(row.text || "").replace(/\s+/g, " ").trim();
      if (!text) return `[${stream}]`;
      if (stream === "stdout") return text;
      return `[${stream}] ${text}`;
    }

    function taskProgressIndex(task) {
      if (!task || task.request_id === MAIN_TASK_ID) {
        return 0;
      }

      const stage = String(task.stage || "").toLowerCase();
      const status = String(task.status || "").toLowerCase();
      let index = 0;

      if (status === "running") {
        index = 1;
      }

      if (stage === "preflight" || stage === "auth" || stage === "workspace" || stage === "config") {
        index = Math.max(index, 2);
      } else if (stage === "clone") {
        index = Math.max(index, 3);
      } else if (stage === "codex") {
        index = Math.max(index, 4);
      } else if (stage === "git" || stage === "pr" || stage === "checks") {
        index = Math.max(index, 5);
      }

      const max = TASK_PROGRESS_STEPS.length - 1;
      if (index < 0) return 0;
      if (index > max) return max;
      return index;
    }

    function renderTaskProgress(task) {
      if (!task || task.request_id === MAIN_TASK_ID || isCompletedTask(task)) {
        return null;
      }

      const index = taskProgressIndex(task);
      const progress = document.createElement("div");
      progress.className = "task-progress";

      const track = document.createElement("div");
      track.className = "task-progress-track";

      const line = document.createElement("div");
      line.className = "task-progress-line";

      const fill = document.createElement("div");
      fill.className = "task-progress-fill";
      if (TASK_PROGRESS_STEPS.length > 1) {
        fill.style.width = `${(index / (TASK_PROGRESS_STEPS.length - 1)) * 100}%`;
      } else {
        fill.style.width = "100%";
      }
      line.appendChild(fill);

      const steps = document.createElement("div");
      steps.className = "task-progress-steps";
      for (let i = 0; i < TASK_PROGRESS_STEPS.length; i += 1) {
        const step = TASK_PROGRESS_STEPS[i];
        const marker = document.createElement("span");
        marker.className = "task-progress-step";

        let stateText = "upcoming";
        if (i < index) {
          marker.classList.add("done");
          stateText = "done";
        } else if (i === index) {
          marker.classList.add("current");
          stateText = "current";
        }

        marker.title = `${step.label}: ${stateText}. ${step.detail}`;
        steps.appendChild(marker);
      }

      const label = document.createElement("div");
      label.className = "task-progress-label";
      label.textContent = `current step: ${TASK_PROGRESS_STEPS[index].label}`;

      track.append(line, steps);
      progress.append(track, label);
      return progress;
    }

    function clearTaskResult() {
      taskResult.className = "task-result";
      taskResult.replaceChildren();
    }

    function renderTaskResult(task) {
      clearTaskResult();

      if (!task || task.request_id === MAIN_TASK_ID) {
        return;
      }

      const status = task.status || "";
      if (status !== "ok" && status !== "no_changes" && status !== "error" && status !== "invalid" && status !== "duplicate") {
        return;
      }

      taskResult.className = `task-result show ${statusClass(status)}`;

      const title = document.createElement("span");
      title.className = "task-result-title";
      taskResult.appendChild(title);

      const detail = document.createElement("span");
      detail.className = "task-result-detail";

      if (status === "ok") {
        title.textContent = "Task Success";
        detail.textContent = task.pr_url ? "Pull request created." : "Completed.";
      } else if (status === "no_changes") {
        title.textContent = "Task Complete";
        detail.textContent = "No code changes were detected.";
      } else if (status === "duplicate") {
        title.textContent = "Duplicate Ignored";
        detail.textContent = task.error ? task.error : "An equivalent prompt/repo/branch submission was ignored.";
      } else {
        title.textContent = "Task Failed";
        detail.textContent = task.error ? task.error : "See logs for failure details.";
      }
      taskResult.appendChild(detail);

      if (status === "ok" && task.pr_url) {
        const link = document.createElement("a");
        link.className = "task-result-link";
        link.href = task.pr_url;
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.textContent = task.pr_url;
        taskResult.appendChild(link);
      }
    }

    function selectTask(id) {
      state.selectedTaskId = id || "";
      render(state.snapshot);
    }

    function renderTasks(snapshot) {
      const tasks = displayTasks(snapshot);
      taskCount.textContent = String(tasks.length);
      taskList.replaceChildren();

      if (!tasks.length) {
        const empty = document.createElement("div");
        empty.className = "placeholder";
        empty.textContent = "No tasks started yet.";
        taskList.appendChild(empty);
        return;
      }

      if (!state.selectedTaskId || !tasks.some(t => t.request_id === state.selectedTaskId)) {
        state.selectedTaskId = tasks[0].request_id;
      }

      for (const task of tasks) {
        const node = document.createElement("article");
        node.className = "task" + (task.request_id === state.selectedTaskId ? " active" : "");
        node.addEventListener("click", () => selectTask(task.request_id));

        const top = document.createElement("div");
        top.className = "task-top";

        const id = document.createElement("div");
        id.className = "task-id";
        id.textContent = taskDisplayLabel(task);
        const prompt = taskPromptText(task);
        if (prompt) {
          id.title = `${task.display_id || task.request_id}: ${prompt}`;
        }

        const badge = document.createElement("span");
        badge.className = `badge ${statusClass(task.status)}`;
        badge.textContent = task.status || "pending";

        const topActions = document.createElement("div");
        topActions.className = "task-top-actions";
        topActions.appendChild(badge);

        if (canRerunTask(task)) {
          const rerun = document.createElement("button");
          rerun.type = "button";
          rerun.className = "task-rerun";
          rerun.textContent = "Re-run";
          rerun.title = "Queue this task configuration again";
          rerun.disabled = state.rerunInFlight.has(task.request_id);
          rerun.addEventListener("click", (event) => {
            event.stopPropagation();
            rerunTask(task.request_id);
          });
          topActions.appendChild(rerun);
        }

        if (isCompletedTask(task)) {
          const close = document.createElement("button");
          close.type = "button";
          close.className = "task-close";
          close.textContent = "Close";
          close.title = "Abandon completed task";
          close.disabled = state.closeInFlight.has(task.request_id);
          close.addEventListener("click", (event) => {
            event.stopPropagation();
            dismissTask(task.request_id);
          });
          topActions.appendChild(close);
        }

        top.append(id, topActions);

        const meta = document.createElement("div");
        meta.className = "task-meta";

        const stage = document.createElement("div");
        const stageLabel = task.stage ? `${task.stage}${task.stage_status ? ` (${task.stage_status})` : ""}` : "-";
        stage.textContent = `stage: ${stageLabel}`;
        const skill = document.createElement("div");
        skill.textContent = `skill: ${task.skill || "-"}`;
        const repos = document.createElement("div");
        repos.textContent = `repos: ${formatTaskRepos(task)}`;
        const update = document.createElement("div");
        update.textContent = `updated: ${relativeTime(task.updated_at)}`;
        meta.append(stage, skill, repos, update);

        const progress = renderTaskProgress(task);

        const output = document.createElement("div");
        output.className = "task-output-list";

        const previews = taskPreviewLines(task);
        if (!previews.length) {
          const empty = document.createElement("div");
          empty.className = "task-output-line meta";
          empty.textContent = "No output yet.";
          output.appendChild(empty);
        } else {
          for (const row of previews) {
            const line = document.createElement("div");
            const stream = row.stream || "meta";
            line.className = `task-output-line ${stream}`;
            line.textContent = previewText(row);
            output.appendChild(line);
          }
        }

        if (progress) {
          node.append(top, meta, progress, output);
        } else {
          node.append(top, meta, output);
        }
        taskList.appendChild(node);
      }
    }

    function renderTerminal(snapshot) {
      const tasks = displayTasks(snapshot);
      const selected = tasks.find(t => t.request_id === state.selectedTaskId);
      if (!selected) {
        taskHead.textContent = "Select a task to inspect logs";
        clearTaskResult();
        terminal.textContent = "";
        return;
      }

      const selectedLabel = taskDisplayLabel(selected);
      taskHead.textContent = `${selectedLabel} | ${selected.status || "pending"} | ${selected.stage || "-"}`;
      renderTaskResult(selected);
      terminal.replaceChildren();

      if (!selected.logs?.length) {
        terminal.textContent = "No output captured yet.";
        return;
      }

      const frag = document.createDocumentFragment();
      for (const row of selected.logs) {
        const line = document.createElement("div");
        const stream = row.stream || "meta";
        line.className = stream === "stderr" ? "stderr-line" : (stream === "stdout" ? "stdout-line" : "meta-line");
        line.textContent = `[${relativeTime(row.time)}] [${stream}] ${row.text}`;
        frag.appendChild(line);
      }
      terminal.appendChild(frag);
      terminal.scrollTop = terminal.scrollHeight;
    }

    function render(snapshot) {
      if (!snapshot) return;
      state.snapshot = snapshot;
      renderHubConnection(snapshot);
      renderTasks(snapshot);
      renderTerminal(snapshot);
    }

    async function loadInitial() {
      try {
        const response = await fetch("/api/state", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`state http ${response.status}`);
        }
        const snapshot = await response.json();
        render(snapshot);
      } catch (err) {
        setLocalConnection(false, `Unable to load state: ${err.message}`);
      }
    }

    function startStream() {
      const stream = new EventSource("/api/stream");

      stream.onopen = () => {
        setLocalConnection(true, "Connected");
      };

      stream.onmessage = (event) => {
        try {
          const snapshot = JSON.parse(event.data);
          render(snapshot);
        } catch (_err) {
          // Ignore malformed event packets.
        }
      };

      stream.onerror = () => {
        setLocalConnection(false, "Reconnecting...");
      };
    }

    async function submitLocalPrompt(event) {
      event.preventDefault();
      let normalized = null;
      try {
        normalized = normalizedLocalPromptPayload(localPromptInput.value);
      } catch (err) {
        setLocalPromptStatus("error", `Invalid JSON: ${err.message}`);
        return;
      }
      localPromptInput.value = normalized.pretty;

      localPromptSubmit.disabled = true;
      setLocalPromptStatus("warn", "Submitting...");

      try {
        const response = await fetch("/api/local-prompt", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: normalized.compact,
        });

        let body = null;
        try {
          body = await response.json();
        } catch (_err) {
          body = null;
        }

        if (!response.ok) {
          if (response.status === 409 && body?.duplicate) {
            setLocalPromptStatus("warn", duplicateNotice(body));
            return;
          }
          throw new Error(body?.error || `submit http ${response.status}`);
        }

        const requestID = body?.request_id || "(unknown)";
        setLocalPromptStatus("ok", `Queued request ${requestID}`);
      } catch (err) {
        setLocalPromptStatus("error", `Submit failed: ${err.message}`);
      } finally {
        localPromptSubmit.disabled = false;
      }
    }

    localPromptForm.addEventListener("submit", submitLocalPrompt);
    loadInitial();
    startStream();
  </script>
</body>
</html>
